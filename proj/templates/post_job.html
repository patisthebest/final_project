<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job Vacancy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
        .container { max-width: 700px; margin: 0 auto; padding: 3rem 1rem; }
        h2 { margin-bottom: 1rem; }
        form { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); padding: 20px; border-radius: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); color: #fff; }
        label { display: block; margin-top: 10px; font-weight: 600; }
        input, textarea, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid rgba(255,255,255,0.35); border-radius: 5px; background: rgba(255,255,255,0.95); color: #111; }
        button { background: #ffffff; color: #667eea; padding: 10px 16px; border: none; cursor: pointer; margin-top: 20px; border-radius: 6px; font-weight: 700; }
        button:hover { background: #f3f3f3; }
        .messages { margin-bottom: 20px; }
        .success { color: #b7f5b7; }
        .error { color: #ffcfdf; }
        a { color: #f8f8f8; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Post Job Vacancy</h2>
        <div class="messages">
            {% for message in messages %}
                <p class="{% if message.tags == 'success' %}success{% else %}error{% endif %}">{{ message }}</p>
            {% endfor %}
        </div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: red;">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit">Post Job</button>
        </form>
        <p><a href="{% url 'job_list' %}">View All Job Vacancies</a></p>
    </div>
</body>
</html>
